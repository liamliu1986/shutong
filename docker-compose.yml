version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shutong-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/shutong}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - BAIDU_OCR_API_KEY=${BAIDU_OCR_API_KEY}
      - BAIDU_OCR_SECRET_KEY=${BAIDU_OCR_SECRET_KEY}
    depends_on:
      - mongo
      - neo4j
    networks:
      - shutong-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shutong-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    networks:
      - shutong-network

  mongo:
    image: mongo:7
    container_name: shutong-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - shutong-network

  neo4j:
    image: neo4j:5
    container_name: shutong-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - shutong-network

volumes:
  mongo-data:
  neo4j-data:
  neo4j-logs:

networks:
  shutong-network:
    driver: bridge
